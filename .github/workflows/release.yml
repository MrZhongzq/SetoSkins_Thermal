name: release
on:
  push:
    paths:
      - "SetoSkins.json"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: 1. Prepare
        run: |
          echo "version=$(jq -r .version $GITHUB_WORKSPACE/SetoSkins.json)" >> $GITHUB_ENV
          echo "versionCode=$(jq -r .versionCode $GITHUB_WORKSPACE/SetoSkins.json)" >> $GITHUB_ENV
          echo "ModuleFolderName=SetoSkins" >> $GITHUB_ENV
      - name: 2. Build module zip
        run: |
          mkdir -p "$GITHUB_WORKSPACE"/GithubRelease
          echo "version=${{ env.version }}" >>$GITHUB_WORKSPACE/${{ env.ModuleFolderName }}/module.prop
          echo "versionCode=${{ env.versionCode }}" >>$GITHUB_WORKSPACE/${{ env.ModuleFolderName }}/module.prop
          cd $GITHUB_WORKSPACE/${{ env.ModuleFolderName }}
          # Remove non-module files
          rm -rf $GITHUB_WORKSPACE/${{ env.ModuleFolderName }}/工口本
          rm -rf $GITHUB_WORKSPACE/${{ env.ModuleFolderName }}/system/SetoFastCharge.orig
          # Set executable permissions
          chmod 755 action.sh system/SetoFastCharge
          zip -q -r SetoSkins_Thermal.zip *
          mv $GITHUB_WORKSPACE/${{ env.ModuleFolderName }}/SetoSkins_Thermal.zip "$GITHUB_WORKSPACE"/GithubRelease/SetoSkins_Thermal.zip
          cd "$GITHUB_WORKSPACE"
          touch file.log
          echo "SetoSkins_Thermal.zip" > file.log
      - name: 3. Upload to Github Release (pre-release)
        uses: ncipollo/release-action@main
        with:
          artifacts: ${{ github.workspace }}/GithubRelease/*
          name: "Seto Thermal ${{ env.version }}"
          tag: "${{ env.version }}"
          bodyFile: "${{ github.workspace }}/file.log"
          allowUpdates: true
          artifactErrorsFailBuild: true
          prerelease: true
          makeLatest: false
      - name: 4. Re-checkout
        run: |
          rm -rf $GITHUB_WORKSPACE/*
      - uses: actions/checkout@main
      - name: 5. Update download URL
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          OWNER="${{ github.repository_owner }}"
          REPO="SetoSkins_Thermal"
          sed -i '4d' $GITHUB_WORKSPACE/SetoSkins.json
          browser_download_url=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/releases/tags/${{ env.version }}" \
            | jq -r '.assets[].browser_download_url' | head -1)
          sed -i '3a "zipUrl": "'"$browser_download_url"'",' $GITHUB_WORKSPACE/SetoSkins.json
          jq . $GITHUB_WORKSPACE/SetoSkins.json > $GITHUB_WORKSPACE/new.json
          rm -rf $GITHUB_WORKSPACE/SetoSkins.json && mv $GITHUB_WORKSPACE/new.json $GITHUB_WORKSPACE/SetoSkins.json
          git add ./SetoSkins.json
          if git commit -m "${{ env.version }}"; then
              echo "push=true" >> $GITHUB_ENV
          else
              echo "push=false" >> $GITHUB_ENV
          fi
      - if: ${{ env.push == 'true' }}
        name: 6. Push updated JSON
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref }}
